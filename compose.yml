name: loki-alloy-stack

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./data/loki:/loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - observability
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.2.0
    container_name: alloy
    ports:
      - "12345:12345"
    volumes:
      - type: bind
        source: /var/log
        target: /var/log
        read_only: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
      - type: bind
        source: ./config/config.alloy
        target: /etc/alloy/config.alloy
        read_only: true
      - ./data/alloy:/var/lib/alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy /etc/alloy/config.alloy
    group_add:
      - "999"  # docker group
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:12345/api/v0/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    privileged: false  # Explicitly disable privileged mode

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/loki.yaml
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki:3100
            jsonData:
              timeout: 60
              maxLines: 1000
            isDefault: true
        EOF
        /run.sh
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
    networks:
      - observability
    depends_on:
      - loki
    restart: unless-stopped

  # Log generator for testing
  flog:
    image: mingrammer/flog:latest
    container_name: flog
    command: -f json -d 200ms -l
    networks:
      - observability
    depends_on:
      - alloy
    restart: unless-stopped

networks:
  observability:
    name: observability
    driver: bridge

volumes:
  loki-data:
    driver: local
  alloy-data:
    driver: local
  grafana-data:
    driver: local